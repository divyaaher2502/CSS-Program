<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Event Demo</title>
    <script>
        function myfun()
        {
            alert("Hello World");
        }
    </script>
</head>
<body>
    <form>
        <input type="button" value="Click" onclick="myfun()">
    </form>
</body>
</html>
