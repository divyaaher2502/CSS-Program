<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Demo</title>
</head>
<body>
    <script>
        a=new Array();
        a[0]=40;
        a[1]=30;
        a[2]=10;
        a[3]=50;
        a[4]=20;
        document.write("The elements in array...<br/>");
        for(i=0;i<a.length;i++)
        {
            document.write(a[i]+"<br>");
        }
        document.write("<br/>The array is sorted...<br/>");
        a.sort();
        for(i=0;i<a.length;i++)
        {
            document.write(a[i]+"<br>");
        }
    </script>
</body>
</html>
