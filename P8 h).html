<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onfocus Event Demo</title>
    <script>
    function Myfunction(x)
    {
       x.style.background="yellow";
    }
</script>
</head>
<body>
    Enter your name:<input type="text" onfocus="Myfunction(this)">
</body>
</html>
