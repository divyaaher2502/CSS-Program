<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Converting String To Number </title>
</head>
<body>
  <script>
    var str="100";
    var b=100;
    var a=parseInt(str);
    c=a+b;
    document.write("C="+c+"<br>");
    s=str+b;
    document.write("S="+s);
  </script>
</body>
</html>
