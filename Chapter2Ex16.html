<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joining a String</title>
</head>
<body>
    <script>
        var Name1="Shivaji";
        var Name2="Shahaji";
        var Name3="Bhosale";
        var Name4=Name1.concat(Name2);
        var Name5=Name4.concat(Name3);
        document.write(Name5);

    </script>
</body>
</html>
