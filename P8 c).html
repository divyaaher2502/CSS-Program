<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnKeypress Event Demo</title>
    <script>
        function Myfunction()
        {
            alert("You pressed a key inside the input field");
        }
    </script>
</head>
<body>
    <input type="text" onkeypress="Myfunction()">
</body>
</html>
