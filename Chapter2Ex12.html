<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Calling to Another Function</title>
<script>
    function A()
    {
        document.write("Hi Good Morning");
    }
    function B()
    {
        A();
    }
</script>
</head>
<body onload="B()">
    <script>

    </script>
</body>
</html>
