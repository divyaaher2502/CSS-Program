<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnSelect Event Demo</title>
    <script>
        function Myfunction()
        {
            document.write("Selected some text");
        }
    </script>
</head>
<body>
  Some text:<input type="text" value="Hello World!" onselect="Myfunction()">  
</body>
</html>
