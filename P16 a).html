<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        MyBanners=new Array('banner1.jpg','banner2.png','banner3.jpg','banner4.png');
        banner=0;
        function ShowBanners()
        {
            if(document.images)
            {
                banner++;
                if(banner==MyBanners.length)
                {
                    banner=0
                
                }
                document.ChangeBanner.src=MyBanners[banner]
                setTimeout("ShowBanners()",5000);
            }
        }
    </script>
</head>
<body onload="ShowBanners()">
    <center>
        <img src="banner1.jpg" width="900" height="200" name="ChangeBanner"/>

    </center>
    
</body>
</html>
