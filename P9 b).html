<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disabling Element Demo</title>
    <script>
         function DisableFunction()
        {
            documen.forms.myform.name.disable=true
        }
        function EnableFunction()
        {
           document.forms.myform.name.disable=false
        }
       
    </script>
</head>
<body>
    <form name="myform">
     Username:<input type="text" name="name"/>
     <br/><br/>
     <input type="button" value="Disable Name Field" onclick="DisableFunction()"/>
     <br/><br/>
     <input type="button" value="Enable Name Field" onclick="EnableFunction()"/>

    </form>
</body>
</html>
