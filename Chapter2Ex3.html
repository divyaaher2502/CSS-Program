<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Loop Demo</title>
</head>
<body>
    <script type="text/javaScript">
        Days=new Array();
        Days[0]="Sunday";
        Days[1]="Monday";
        Days[2]="Tuesday";
        Days[3]="Wednesday";
        Days[4]="Thursday";
        Days[5]="Friday";
        Days[6]="Saturday";
        for(i=0;i<Days.length;i++)
        {
            document.write(Days[i]+"<br>");
        }
    </script>
</body>
</html>
