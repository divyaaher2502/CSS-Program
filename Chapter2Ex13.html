<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Returning a Value of Function</title>
    <script>
        function myfun()
        {
str="Hello Divya";
return str;
        }
    </script>
</head>
<body>
    <script>
        document.write(myfun()+"<br>");
    </script>
</body>
</html>
