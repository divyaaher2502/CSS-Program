<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changing Array Demo</title>
</head>
<body>
    <script>
        a=new Array();
        a[0]=10;
        a[1]=20;
        a[2]=30;
        a[3]=40;
        a[4]=50;
        document.write("Print the element..."+"<br>")
        for(i=0;i<a.length;i++)
        {
            document.write(a[i]+"<br>");
        }
        document.write("The element are shifted:");
        str1=a.shift();
        document.write(str1+"<br>");
        document.write("The element in array are..."+"<br>")
        for(i=0;i<a.length;i++)
        {
            document.write(a[i]+"<br>");
        }
    </script>
</body>
</html>
