<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Associate Array Demo</title>
</head>
<body>
    <script>
        a=new Array();
        a["One"]=1;
        a["Two"]=2;
        a["Three"]=3;
        a["Four"]=4;
        a["Five"]=5;
        document.write("The element in array are..."+"<br><br>");
        for(i in a)
        {
            document.write(i+"="+a[i]+"<br/>");
        }
    </script>
</body>
</html>
