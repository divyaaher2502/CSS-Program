<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comding Array Demo</title>
</head>
<body>
    <script>
        a=new Array();
        a[0]="ABC";
        a[1]="PQR";
        a[2]="XYZ";
        a[3]="JKL";
        document.write("<h2>Use Concat Method</h2>");
        str1=a.concat();
        document.write(str1);
        document.write("<h2>Use Join Method</h2>");
        str2=a.join('');
        document.write(str2);

    </script>
</body>
</html>
