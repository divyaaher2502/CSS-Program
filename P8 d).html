<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onkeyup Event Demo</title>
    <script>
        function Myfunction()
        {
            var x=document.getElementById("fname");
            x.value=x.value.toUpperCase();
        }
    </script>
</head>
<body>
    Enter your name:
    <input type="text" id="fname" onkeyup="Myfunction()">
</body>
</html>
