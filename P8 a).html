<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onload Event Demo</title>
    <script>
        function Myfunction()
        {
            alert("Page is loaded");
        }
    </script>
</head>
<body onload="Myfunction()">
   <h2>Hello World!</h2> 
</body>
</html>
