<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p onmouseover="this.style.color='red'" onmouseout="this.style.color='blue'">
    Move the mouse over this text to change its color to red. Move the mouse away to change the text color to blue.</p>
</body>
</html>
