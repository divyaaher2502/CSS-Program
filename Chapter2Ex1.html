    <script>
        a=new Array(5);
        for(i=0;i<5;i++)

        }
        document.write("Another way of initialization:"+"<br>");
        b=new Array(10,20,30,40,50);
        for(i=0;i<5;i++)

            document.write(b[i]+"<br>");

        }
         document.write("Yet another way if initilization:"+"<br>");
        var c=new Array(11,22,33,44,55,66);
        for(i=0;i<6;i++)
        {
            document.write(c[i]+"<br>");

        }
    </script>
